<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wikipedia Live Edits</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 24px 32px;
      border-bottom: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f0f0f5;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e88;
      animation: pulse 2s ease-in-out infinite;
    }

    .pulse.error { background: #ef4444; box-shadow: 0 0 6px #ef444488; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    .stats {
      display: flex;
      gap: 20px;
      font-size: 13px;
      color: #888;
    }

    .stats span { color: #c0c0cc; font-variant-numeric: tabular-nums; }

    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .event {
      display: grid;
      grid-template-columns: 150px 1fr 180px 140px;
      gap: 12px;
      padding: 10px 32px;
      font-size: 13px;
      border-bottom: 1px solid #13131d;
      animation: fadeIn .3s ease;
    }

    .event:hover { background: #12121e; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .event .domain { color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event .title { color: #93c5fd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event .user { color: #a78bfa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event .type { text-transform: uppercase; font-size: 11px; font-weight: 600; letter-spacing: .5px; }

    .type-edit { color: #22c55e; }
    .type-new { color: #3b82f6; }
    .type-log { color: #eab308; }
    .type-categorize { color: #f97316; }

    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: #555;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .event { grid-template-columns: 1fr 1fr; padding: 10px 16px; }
      header { padding: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1><div class="pulse" id="status"></div> Wikipedia Live Edits</h1>
    <div class="stats">
      Events: <span id="count">0</span>&nbsp;&nbsp;|&nbsp;&nbsp;EPS: <span id="eps">0</span>
    </div>
  </header>
  <div id="feed"><div class="empty" id="placeholder">Connecting to Wikimedia EventStream&hellip;</div></div>

  <script>
    const feed = document.getElementById('feed');
    const countEl = document.getElementById('count');
    const epsEl = document.getElementById('eps');
    const statusEl = document.getElementById('status');
    const placeholder = document.getElementById('placeholder');
    const MAX_ROWS = 200;
    let total = 0;
    let window_count = 0;

    setInterval(() => { epsEl.textContent = window_count; window_count = 0; }, 1000);

    const typeClass = { edit: 'type-edit', new: 'type-new', log: 'type-log', categorize: 'type-categorize' };

    function addEvent(d) {
      if (placeholder) placeholder.remove();
      total++;
      window_count++;
      countEl.textContent = total;

      const row = document.createElement('div');
      row.className = 'event';
      row.innerHTML =
        `<span class="domain">${esc(d.meta?.domain || d.server_name || '')}</span>` +
        `<span class="title">${esc(d.title || '')}</span>` +
        `<span class="user">${esc(d.user || '')}</span>` +
        `<span class="type ${typeClass[d.type] || ''}">${esc(d.type || '')}</span>`;
      feed.prepend(row);

      while (feed.children.length > MAX_ROWS) feed.lastElementChild.remove();
    }

    function esc(s) { const d = document.createElement('span'); d.textContent = s; return d.innerHTML; }

    function connect() {
      const es = new EventSource('https://stream.wikimedia.org/v2/stream/recentchange');
      es.onopen = () => statusEl.classList.remove('error');
      es.onerror = () => { statusEl.classList.add('error'); };
      es.onmessage = (ev) => {
        try { addEvent(JSON.parse(ev.data)); } catch {}
      };
    }

    connect();
  </script>
</body>
</html>
